name: Build and Release CHDMAN-GUI

# This action triggers whenever you push a tag that starts with "v" (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows x86-64
          - os: windows-latest
            arch: x86_64
            artifact_name: CHDMAN-GUI.exe
            asset_name: CHDMAN-GUI-Windows-x86_64.exe

          # Linux x86-64 (PyInstaller Standalone Binary)
          - os: ubuntu-latest
            arch: x86_64
            artifact_name: CHDMAN-GUI
            asset_name: CHDMAN-GUI-Linux-x86_64

          # macOS Intel (x86-64)
          - os: macos-13
            arch: x86_64
            artifact_name: CHDMAN-GUI.app
            asset_name: CHDMAN-GUI-macOS-Intel.zip

          # macOS Apple Silicon (ARM64)
          - os: macos-14
            arch: arm64
            artifact_name: CHDMAN-GUI.app
            asset_name: CHDMAN-GUI-macOS-AppleSilicon.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Build with PyInstaller (Windows/Linux)
        if: runner.os != 'macOS'
        run: pyinstaller --noconsole --onefile --name CHDMAN-GUI chman_gui.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --noconsole --windowed --name CHDMAN-GUI chman_gui.py

      - name: Zip macOS App Bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Rename Windows/Linux Assets
        if: runner.os != 'macOS'
        shell: bash
        run: |
          mv dist/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
          # Make Linux binary executable
          if [ "${{ runner.os }}" == "Linux" ]; then
            chmod +x ./${{ matrix.asset_name }}
          fi

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
