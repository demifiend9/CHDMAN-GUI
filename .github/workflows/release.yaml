name: Build and Release CHDMAN-GUI

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: x86_64
            artifact_name: CHDMAN-GUI.exe
            archive_name: CHDMAN-GUI-Windows-x86_64.zip
          
          # Linux
          - os: ubuntu-latest
            arch: x86_64
            artifact_name: CHDMAN-GUI
            archive_name: CHDMAN-GUI-Linux-x86_64.tar.gz
          
          # macOS Intel
          - os: macos-15-intel
            arch: x86_64
            artifact_name: CHDMAN-GUI.app
            archive_name: CHDMAN-GUI-macOS-Intel.zip
          
          # macOS Apple Silicon
          - os: macos-14
            arch: arm64
            artifact_name: CHDMAN-GUI.app
            archive_name: CHDMAN-GUI-macOS-AppleSilicon.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      # EXCLUSIONS LIST: Strips out massive unused Qt modules (Web browsers, SQL, 3D engines, etc.)
      - name: Build with PyInstaller (Windows/Linux)
        if: runner.os != 'macOS'
        run: >
          pyinstaller --noconsole --onefile --name CHDMAN-GUI
          --exclude-module PyQt6.QtWebEngine 
          --exclude-module PyQt6.QtWebEngineCore 
          --exclude-module PyQt6.QtWebEngineWidgets 
          --exclude-module PyQt6.QtNetwork 
          --exclude-module PyQt6.QtQml 
          --exclude-module PyQt6.QtQuick 
          --exclude-module PyQt6.QtSql 
          --exclude-module PyQt6.QtTest 
          --exclude-module PyQt6.QtXml 
          --exclude-module PyQt6.QtBluetooth 
          --exclude-module PyQt6.QtMultimedia 
          --exclude-module PyQt6.QtMultimediaWidgets 
          --exclude-module PyQt6.QtOpenGL 
          --exclude-module PyQt6.QtOpenGLWidgets 
          --exclude-module PyQt6.QtPositioning 
          --exclude-module PyQt6.QtPrintSupport 
          --exclude-module PyQt6.QtSensors 
          --exclude-module PyQt6.QtSerialPort 
          --exclude-module PyQt6.QtSvg 
          --exclude-module PyQt6.QtWebChannel 
          --exclude-module PyQt6.QtWebSockets 
          chdman_gui.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller --noconsole --windowed --name CHDMAN-GUI
          --exclude-module PyQt6.QtWebEngine 
          --exclude-module PyQt6.QtWebEngineCore 
          --exclude-module PyQt6.QtWebEngineWidgets 
          --exclude-module PyQt6.QtNetwork 
          --exclude-module PyQt6.QtQml 
          --exclude-module PyQt6.QtQuick 
          --exclude-module PyQt6.QtSql 
          --exclude-module PyQt6.QtTest 
          --exclude-module PyQt6.QtXml 
          --exclude-module PyQt6.QtBluetooth 
          --exclude-module PyQt6.QtMultimedia 
          --exclude-module PyQt6.QtMultimediaWidgets 
          --exclude-module PyQt6.QtOpenGL 
          --exclude-module PyQt6.QtOpenGLWidgets 
          --exclude-module PyQt6.QtPositioning 
          --exclude-module PyQt6.QtPrintSupport 
          --exclude-module PyQt6.QtSensors 
          --exclude-module PyQt6.QtSerialPort 
          --exclude-module PyQt6.QtSvg 
          --exclude-module PyQt6.QtWebChannel 
          --exclude-module PyQt6.QtWebSockets 
          chdman_gui.py

      # PACKAGING: Windows (Zips the clean .exe)
      - name: Package Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\${{ matrix.artifact_name }} -DestinationPath ${{ matrix.archive_name }}

      # PACKAGING: Linux (Tars the clean binary)
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/${{ matrix.artifact_name }}
          tar -czvf ${{ matrix.archive_name }} -C dist ${{ matrix.artifact_name }}

      # PACKAGING: macOS (Zips the .app folder)
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.archive_name }} ${{ matrix.artifact_name }}

      # UPLOAD
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
